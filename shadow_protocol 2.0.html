// YF-118G Bird of Prey — Boeing stealth demonstrator, bat-wing, bubble canopy
function buildBirdOfPrey() {
  const g = new THREE.Group();
  const mat = (c,e=0x000208) => new THREE.MeshLambertMaterial({color:c,emissive:e});
  const col = 0x0a0f14;

  // Very flat, narrow fuselage pod
  const fus = new THREE.Mesh(new THREE.CylinderGeometry(0.55,0.28,11,7), mat(col));
  fus.rotation.x=HALF_PI; fus.scale.set(1,0.50,1); g.add(fus);

  // Highly swept delta wing — almost no chord at tip
  function bopWing(flip) {
    const v = new Float32Array([0,0,0, 0,0,-4, flip?-11:11,0,1, flip?-7:7,0,4]);
    const idx = flip?[0,1,2,0,2,3]:[0,2,1,0,3,2];
    const wg = new THREE.BufferGeometry();
    wg.setAttribute('position',new THREE.BufferAttribute(v,3));
    wg.setIndex(idx); wg.computeVertexNormals();
    const m = new THREE.Mesh(wg,mat(col)); m.scale.set(1,0.13,1); return m;
  }
  const bwL=bopWing(true);  bwL.position.set(-0.4,0,2); g.add(bwL);
  const bwR=bopWing(false); bwR.position.set( 0.4,0,2); g.add(bwR);

  // Single engine — centered rear
  const eng = new THREE.Mesh(new THREE.CylinderGeometry(0.48,0.55,3.5,8),mat(0x151f28));
  eng.rotation.x=HALF_PI; eng.position.set(0,-0.05,5.5); g.add(eng);
  const gl = new THREE.PointLight(0x4400ff,0,50);
  gl.position.set(0,-0.05,7.2); g.add(gl);
  g.userData.glows=[gl];

  // Nose fairing — fills gap between fuselage front and cockpit
  const nfar = new THREE.Mesh(new THREE.ConeGeometry(0.55,3,7),mat(col));
  nfar.rotation.x=-HALF_PI; nfar.scale.set(1,0.50,1);
  nfar.position.set(0,0,-6); g.add(nfar);
  // Distinctive bubble canopy
  const cap = new THREE.Mesh(new THREE.SphereGeometry(0.52,8,6,0,TAU,0,HALF_PI),
    new THREE.MeshLambertMaterial({color:0x001020,transparent:true,opacity:0.8}));
  cap.position.set(0,0.48,-2.5); cap.scale.set(0.9,0.9,1.4); g.add(cap);

  return g;
}

// A-12 OXCART — Mach 3.2 CIA recon, long needle with delta wings, twin nacelles
function buildA12Oxcart() {
  const g = new THREE.Group();
  const mat = (c,e=0x000208) => new THREE.MeshLambertMaterial({color:c,emissive:e});
  const col = 0x131b22;

  // Very long needle fuselage
  const fus = new THREE.Mesh(new THREE.CylinderGeometry(0.52,0.22,20,8),mat(col));
  fus.rotation.x=HALF_PI; fus.scale.set(1,0.52,1); g.add(fus);

  // Needle nose — connected flush to fuselage front
  const nose = new THREE.Mesh(new THREE.ConeGeometry(0.52,8,8),mat(0x0d1521));
  nose.rotation.x=-HALF_PI; nose.scale.set(1.0,0.52,1);
  nose.position.z=-14; g.add(nose);

  // Wide delta wings (chines blend into fuselage)
  function a12Wing(flip) {
    const v = new Float32Array([0,0,0, 0,0,-8, flip?-10:10,0,0, flip?-6:6,0,5]);
    const idx = flip?[0,1,2,0,2,3]:[0,2,1,0,3,2];
    const wg = new THREE.BufferGeometry();
    wg.setAttribute('position',new THREE.BufferAttribute(v,3));
    wg.setIndex(idx); wg.computeVertexNormals();
    const m = new THREE.Mesh(wg,mat(col)); m.scale.set(1,0.14,1); return m;
  }
  const wL=a12Wing(true); wL.position.set(-0.6,0,3); g.add(wL);
  const wR=a12Wing(false); wR.position.set(0.6,0,3); g.add(wR);

  // Twin engine nacelles on wing (signature SR-71 look)
  [-2.5,2.5].forEach(sx=>{
    const nac=new THREE.Mesh(new THREE.CylinderGeometry(0.55,0.62,5,10),mat(0x192535));
    nac.rotation.x=HALF_PI; nac.position.set(sx,-0.1,4); g.add(nac);
    const gl=new THREE.PointLight(0xff6600,0,60);
    gl.position.set(sx,-0.1,7); g.add(gl);
    if(!g.userData.glows) g.userData.glows=[];
    g.userData.glows.push(gl);
  });

  return g;
}

// HAVE BLUE XST — faceted stealth demonstrator, ancestor of F-117
function buildHaveBlue() {
  const g = new THREE.Group();
  const mat = (c,e=0x000208) => new THREE.MeshLambertMaterial({color:c,emissive:e});
  const col = 0x0c1318;

  // Flat faceted fuselage — very angled facets like early stealth
  const fus = new THREE.Mesh(new THREE.BoxGeometry(1.8,0.5,12),mat(col));
  fus.position.z=0; g.add(fus);
  // Angled nose facet
  const noseGeo = new THREE.ConeGeometry(0.9,7,4);
  noseGeo.rotateX(-HALF_PI); noseGeo.rotateY(PI/4);
  const nose = new THREE.Mesh(noseGeo,mat(0x0a1118));
  nose.position.z=-9; nose.scale.set(1.0,0.32,1.0); g.add(nose);

  // Sharply swept delta wings — flat
  function hbWing(flip) {
    const v = new Float32Array([0,0,0, 0,0,-5, flip?-8:8,0,1, flip?-5:5,0,3.5]);
    const idx = flip?[0,1,2,0,2,3]:[0,2,1,0,3,2];
    const wg = new THREE.BufferGeometry();
    wg.setAttribute('position',new THREE.BufferAttribute(v,3));
    wg.setIndex(idx); wg.computeVertexNormals();
    const m = new THREE.Mesh(wg,mat(col)); m.scale.set(1,0.045,1); return m;
  }
  const wL=hbWing(true); wL.position.set(-0.9,0,1); g.add(wL);
  const wR=hbWing(false); wR.position.set(0.9,0,1); g.add(wR);

  // Inward-canted V-tails (like F-117)
  [-1,1].forEach(s=>{
    const t=new THREE.Mesh(new THREE.BoxGeometry(0.1,2.8,2.8),mat(0x0f1c24));
    t.position.set(s*0.9,0.6,4.8); t.rotation.z=s*-PI/4.5; g.add(t);

  const eng=new THREE.Mesh(new THREE.CylinderGeometry(0.42,0.50,3,8),mat(0x131e28));

// Tacit Blue N/300 "Whale" — wide curved body, straight wings
function buildTacitBlue() {

  const col = 0x10181f;

  const fus = new THREE.Mesh(new THREE.CylinderGeometry(1.8,0.8,11,10),mat(col));
  fus.rotation.x=HALF_PI; fus.scale.set(1,0.52,1); g.add(fus);
  const nose = new THREE.Mesh(new THREE.SphereGeometry(1.4,8,5,0,TAU,0,HALF_PI),mat(0x0d1520));
  nose.rotation.x=HALF_PI; nose.scale.set(1.0,0.5,0.8); nose.position.z=-7.5; g.add(nose);

  // Straight, low-aspect wings
  [-1,1].forEach(s=>{
    const w=new THREE.Mesh(new THREE.BoxGeometry(7,0.18,3.5),mat(col));
    w.position.set(s*5,0,1); g.add(w);
  });

  // Single buried engine exhaust
  const eng=new THREE.Mesh(new THREE.CylinderGeometry(0.45,0.52,3,8),mat(0x151f2a));
  eng.rotation.x=HALF_PI; eng.position.set(0,0.1,5.5); g.add(eng);

function loadMission(idx) {
  // Cancel any pending debrief transition from previous mission
  if (debriefTimer !== null) { clearTimeout(debriefTimer); debriefTimer = null; }
  // Clear projectiles — remove meshes and their child lights
  projectiles.forEach(p => {
    if (p.mesh) {
      p.mesh.traverse(child => { if (child.isLight) scene.remove(child); });
      scene.remove(p.mesh);
    }
  });
  projectiles.length = 0;
  // Clear explosion particles — dispose unique geo/mat
  explParts.forEach(p => {
    if (p.mesh) {
      // Geometry is shared from _explGeos pool — do NOT dispose it
      if (p.mesh.material) p.mesh.material.dispose();
      scene.remove(p.mesh);
    }
    if (p.light) scene.remove(p.light);
  });
  explParts.length = 0;
  // Clear enemies — dispose geometries/materials to prevent GPU leak
  enemies.forEach(e => {
    if (e.mesh) {
      scene.remove(e.mesh);
      e.mesh.traverse(child => {
        if (child.geometry) child.geometry.dispose();
        if (child.material) {
          if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
          else child.material.dispose();
        }
      });
    }
  });
  enemies.length = 0;
  // Clear structures — dispose all geometries and materials to prevent GPU leak
  structures.forEach(s => {
    scene.remove(s);
    s.traverse(child => {
      if (child.geometry) child.geometry.dispose();
      if (child.material) {
        if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
        else child.material.dispose();
      }
    });
  });
  structures.length = 0; _samList.length = 0; _blinkStructures.length = 0;

  const M = MISSIONS[idx];
  if (!M) return;
  campaignMission = idx;

  // Reset player
  player.pos.set(0,1600,0); player.vel.set(0,0,-CRUISE_SPD);
  player.quaternion.identity();
  angVel.p=0; angVel.r=0; angVel.y=0;
  player.speed=CRUISE_SPD; player.hp=acfHpBase; player.maxHp=acfHpBase; _updateHpStr(); player.throttle=0.45;
  player.afterburner=false;
  player._kbThrottle=0; player.gForce=1; player.aoa=0;
  player.flares=10; _flaresStr='FLARES: 10'; player.damageFlash=0; player.missileWarning=0; player.flaresFlash=0;
  player.lockTarget=null; player.lockStrength=0; wasLocked=false; player.lockPinned=false;
  player.weapons[0].ammo=9999; player.weapons[0].ammoStr='∞'; // infinite gun ammo
  player.weapons[1].ammo=4;   player.weapons[1].ammoStr='×4';
  player.weapons[2].ammo=4;   player.weapons[2].ammoStr='×4';
  player.weapons[3].ammo=4;   player.weapons[3].ammoStr='×4';
  player.weapons[4].ammo=2;   player.weapons[4].ammoStr='×2';
  player.weapons.forEach(w => { w.last = 0; w.isLockable = w.type==='ir'||w.type==='radar'; });
  player.mesh.visible=true; player.wIdx=0;

  score=0; _scoreStr='SCORE:    0'; kills=0; missionWon=false; playerDead=false;
  justUnlockedName = ''; _unlockedBadge = '';
  jammerActive = 0; jammerCooldown = 0;
  radioMsgs.length=0;
  camShake=0;

  renderer.setClearColor(MISSION_SKY_COLORS[M.id]||0x00050f,1);
  applyAircraft(playerAircraftId);
  // Update hp/maxHp AFTER applyAircraft sets acfHpBase for selected aircraft
  player.hp = acfHpBase; player.maxHp = acfHpBase; _updateHpStr();

  // Spawn structures
  M.structs.forEach(({x,z,t})=>makeStructure(x,z,t));

  // Spawn enemies
  M.enemies.forEach(({type,x,y,z,name},_ei)=>{
    // Spread enemies: each gets a random positional jitter so they don't cluster
    const _jR=8000+Math.random()*6000; // jitter radius 8000–14000 m
    const _jA=_ei*(TAU/M.enemies.length)+Math.random()*0.6; // evenly spread + small random
    const jx=x+Math.cos(_jA)*_jR, jz=z+Math.sin(_jA)*_jR;
    const jy=y+600+Math.random()*1200; // vary altitude 600–1800m
    spawnEnemy(jx,jy,jz,type,name);
  });

  // Precompute mission stat totals (never change after spawn)
  mTotalEnemies  = enemies.length;
  mAliveEnemies  = enemies.length;
  mTotalAces     = enemies.filter(e=>e.type==='ace').length;
  mAliveAces     = mTotalAces;
  mTotalBombers  = enemies.filter(e=>e.type==='bomber').length;
  mAliveBombers  = mTotalBombers;
  mTotalFighters = enemies.filter(e=>e.type==='fighter').length;
  mAliveFighters = mTotalFighters;
  mHasAces       = mTotalAces > 0;
  mHasBombers    = mTotalBombers > 0;
  mTotalGroundTargets = structures.filter(s=>s.userData.type!=='sam'&&s.userData.type!=='cmd').length;
  mAliveGroundTargets = mTotalGroundTargets;

  // Start briefing
  currentBriefLines = M.brief;
  bLines=[]; bCharIdx=0; bLineIdx=0; bCharT=0;
  // Precompute briefing panel dimensions (avoids per-frame measureText)
  _briefTotal = M.brief.length;
  { const _maxLL = M.brief.reduce((m,l) => l.length>m ? l.length : m, 0);
    _briefPw = Math.min(_maxLL * 7.8 + 28, W - 60);
    _briefPh = Math.min(_briefTotal * 18 + 24, H - 120); }
  // Precompute mission header string used every frame in drawMissionData
  const _mNum = M.id < 10 ? '0'+M.id : ''+M.id;
  _missionHeader = '◆ '+M.name+'  MIS.'+_mNum+'/'+MISSIONS.length;
  _rebuildMissionStrs();
  gState='briefing';
}

function spawnBullet() {
  const pl=player;
  const w = pl.weapons[0];
  const t = clock.getElapsedTime();
  if (t - w.last < w.rate) return;
  w.last = t; // gun ammo is infinite — no decrement
  const fwd = _v0.set(0,0,-1).applyQuaternion(pl.quaternion);
  const _pp=pl.pos, _pv=pl.vel;
  const pos = new THREE.Vector3().copy(_pp).addScaledVector(fwd, 8);
  const vel = new THREE.Vector3().copy(fwd).multiplyScalar(1300).add(_pv);
  // Hard cap: remove oldest bullet if we'd exceed 30 simultaneous
  let _bCount=0;
  for(let _bi=0;_bi<projectiles.length;_bi++){if(projectiles[_bi].isBullet)_bCount++;}
  if(_bCount>=30){
    for(let _bi=0;_bi<projectiles.length;_bi++){
      if(projectiles[_bi].isBullet){removePrj(_bi);break;}
    }
  }
  const mesh = new THREE.Mesh(_bulletGeo, _bulletMat);
  mesh.position.copy(pos);
  scene.add(mesh);
  projectiles.push({type:'bullet',isBullet:true,isMissile:false,isBomb:false,isIR:false,isLgb:false,pos,vel,life:1.2,mesh,dmg:9,fromPlayer:true});

function nearestGroundTarget() {
  const _pp=player.pos;
  let best=null, bd=Infinity;
  const _sLen=structures.length;
  for(let _si=0;_si<_sLen;_si++){
    const s=structures[_si];
    if (!s.userData.alive) continue;
    const d = _pp.distanceToSquared(s.position);

const explParts = [];
const _explVelPool = [];

function boom(pos, scale=1, col=0xff6600) {
  const _rawN=Math.floor(14*scale); const n=explParts.length>80?Math.min(_rawN,4):_rawN;
  const _s1h5=1.5*scale, _s3=3*scale, _s1h5t=1.5*scale, _s3t=3.0*scale, _s6t=6.0*scale;
  const _dfCol  = col === 0xff6600;
  const colOdd  = _dfCol ? _explMatOrange : new THREE.MeshBasicMaterial({color:col,        transparent:true});
  const colEven = _dfCol ? _explMatYellow  : new THREE.MeshBasicMaterial({color:0xffcc00, transparent:true});
  const _vs=90*scale; // hoist: scale constant per boom call
  for (let i=0; i<n; i++) {
    const s = _s1h5+Math.random()*_s3;
    // Pick closest pre-built geometry bucket
    const geoIdx = s < _s1h5t ? 0 : s < _s3t ? 1 : s < _s6t ? 2 : 3;
    // Clone material so each particle has independent opacity
    const mat = (i%2===0 ? colEven : colOdd).clone();
    const m = new THREE.Mesh(_explGeos[geoIdx], mat);
    m.position.copy(pos);
    const v = _explVelPool.length>0?_explVelPool.pop():new THREE.Vector3();
    v.set((Math.random()-.5)*_vs,(Math.random()-.5)*_vs,(Math.random()-.5)*_vs);
    scene.add(m);
    explParts.push({mesh:m, vel:v, life:1.4+Math.random()*0.4, max:1.8});
  }
  if (!_dfCol) { colOdd.dispose(); colEven.dispose(); } // custom colours not reused
  const fl = new THREE.PointLight(col, 6*scale, 500*scale);
  fl.position.copy(pos);
  scene.add(fl);
  explParts.push({mesh:null, light:fl, life:0.5, max:0.5, scale});
  playFx('boom');
  const _bs=scale<2?scale:2; if(camShake<3*_bs) camShake=3*_bs;
}

let aCtx, engOsc, engGain;
let lockSndT = 0;
let jammerActive = 0;   // seconds remaining active (max 6)
let jammerCooldown = 0; // seconds until next use (30s cooldown)

function initAudio() {
  if (aCtx) return;
  aCtx = new (window.AudioContext || window.webkitAudioContext)();
  engOsc = aCtx.createOscillator();
  engOsc.type = 'sawtooth'; engOsc.frequency.value = 75;
  engGain = aCtx.createGain(); engGain.gain.value = 0.035;
  const lp = aCtx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=350;
  engOsc.connect(lp); lp.connect(engGain); engGain.connect(aCtx.destination);
  engOsc.start();
}

function playFx(id) {
  if (!aCtx) return;
  const t = aCtx.currentTime;
  const o = () => { const x=aCtx.createOscillator(),g=aCtx.createGain();
    x.connect(g); g.connect(aCtx.destination);
    x.onended = ()=>{ try{x.disconnect();g.disconnect();}catch(e){} };
    return [x,g]; };
  const noise = (dur,vol,lpFreq=600) => {
    const buf=aCtx.createBuffer(1,aCtx.sampleRate*dur,aCtx.sampleRate);
    const d=buf.getChannelData(0);
    {const _dLen=d.length; for(let i=0;i<_dLen;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/_dLen,1.5);}
    const s=aCtx.createBufferSource(); s.buffer=buf;
    const g=aCtx.createGain(); g.gain.value=vol;
    const lp=aCtx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=lpFreq;
    s.connect(lp); lp.connect(g); g.connect(aCtx.destination);
    s.onended = ()=>{ try{s.disconnect();lp.disconnect();g.disconnect();}catch(e){} };
    s.start(t);
  };
  switch(id) {
    case 'gun': { const [x,g]=o(); x.type='square'; x.frequency.setValueAtTime(130,t);
      x.frequency.exponentialRampToValueAtTime(40,t+0.09);
      g.gain.setValueAtTime(0.16,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.09);
      x.start(t); x.stop(t+0.1); break; }
    case 'launch': { const [x,g]=o(); x.type='sawtooth'; x.frequency.setValueAtTime(180,t);
      x.frequency.exponentialRampToValueAtTime(700,t+0.35);
      g.gain.setValueAtTime(0.2,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.5);
      x.start(t); x.stop(t+0.5); break; }
    case 'boom': noise(0.7, 0.55, 500); break;
    case 'lock': { const [x,g]=o(); x.frequency.value=1100; x.type='sine';
      g.gain.setValueAtTime(0.1,t); g.gain.setValueAtTime(0,t+0.06); g.gain.setValueAtTime(0.1,t+0.11); g.gain.setValueAtTime(0,t+0.17);
      x.start(t); x.stop(t+0.18); break; }
    case 'locked': { const [x,g]=o(); x.frequency.value=1800; x.type='sine';
      g.gain.setValueAtTime(0.15,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.3);
      x.start(t); x.stop(t+0.3); break; }
    case 'mwarn': { const [x,g]=o(); x.type='square'; x.frequency.value=760;
      for(let i=0;i<7;i++){g.gain.setValueAtTime(0.22,t+i*0.11);g.gain.setValueAtTime(0,t+i*0.11+0.055);}
      x.start(t); x.stop(t+0.85); break; }
    case 'nolock': { const [x,g]=o(); x.type='square'; x.frequency.value=220;

function updateEngineAudio() {

  if (!aCtx||!engOsc) return;
  const _pt=pl.throttle;
  engOsc.frequency.setTargetAtTime(65+_pt*180+(pl.afterburner?90:0), aCtx.currentTime, 0.12);

// ─── CONTROLS ───────────────────────────────────────────────
const keys = {};
const NODEF_KEYS = new Set(['Space','Tab','ShiftLeft','ShiftRight','ControlLeft','ControlRight','KeyW','KeyA','KeyS','KeyD','KeyQ','KeyE','KeyF','KeyC','ArrowUp','ArrowDown','ArrowLeft','ArrowRight']);

window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (!aCtx) initAudio();
  if (NODEF_KEYS.has(e.code)) e.preventDefault();

  if (e.code==='Tab') { player.wIdx = (player.wIdx+1) % player.weapons.length; player.lockPinned=false; }
  if (e.code>='Digit1' && e.code<='Digit5') { player.wIdx = parseInt(e.code[5])-1; player.lockPinned=false; }
  if (e.code==='KeyC') deployFlares();
  if (e.code==='KeyR' && gState==='playing') {
    radarRangeIdx=(radarRangeIdx+1)%RADAR_RANGE_OPTIONS.length; _updateRadarRange();
    radioMsg('RADAR RANGE: '+RADAR_RANGE_LABELS[radarRangeIdx]);
  }
  if (e.code==='KeyG' && gState==='playing' && _isJammer) {
    if (jammerCooldown <= 0 && jammerActive <= 0) {
      jammerActive = 6; jammerCooldown = 30;
      radioMsg('EW JAMMER ACTIVE — SAMs SUPPRESSED');
      playFx('locked');
    }
  }
  if (e.code==='Escape') {
    if (gState==='playing') gState='paused';
    else if (gState==='paused') gState='playing';
    else if (gState==='briefing') { gState='mission_select'; selectIdx=clamp(selectIdx,0,campaignUnlocked); }
    else if (gState==='debrief')  { gState='mission_select'; selectIdx=clamp(selectIdx,0,campaignUnlocked); }
    else if (gState==='hangar')   { gState='mission_select'; selectIdx=clamp(selectIdx,0,campaignUnlocked); }
    else if (gState==='mission_select') gState='title';
    else if (gState==='campaign_complete') gState='mission_select';
  }
  if (gState==='mission_select') {
    if (e.code==='ArrowUp'  ||e.code==='KeyW') selectIdx=Math.max(0,selectIdx-1);
    if (e.code==='ArrowDown'||e.code==='KeyS') selectIdx=Math.min(campaignUnlocked,selectIdx+1);
    if (e.code==='ArrowLeft'||e.code==='KeyQ') selectIdx=Math.max(0,selectIdx-5);
    if (e.code==='ArrowRight'||e.code==='KeyE') selectIdx=Math.min(campaignUnlocked,selectIdx+5);
    if (e.code==='Space'||e.code==='Enter') { _enterHangar(selectIdx); return; }
    if (e.code==='KeyH') { _enterHangar(-1); return; } // H = browse hangar
  }
  if (gState==='title') {
    if (e.code==='ArrowUp'||e.code==='KeyW') { titleMenuIdx=0; return; }
    if (e.code==='ArrowDown'||e.code==='KeyS') { titleMenuIdx=1; return; }
    if (e.code==='Space'||e.code==='Enter'||e.code==='KeyZ') {
      if (titleMenuIdx===1) resetCampaign();
      gState='mission_select'; selectIdx=0; return;
    }
  }
  if (gState==='briefing' && (e.code==='Space'||e.code==='Enter'||e.code==='KeyZ')) {
    beginMission(); return;
  }
  if (gState==='debrief' && (e.code==='Space'||e.code==='Enter')) {
    if(missionWon && campaignMission===MISSIONS.length-1){ _enterCampaignComplete(); return; }
    else if(missionWon){ _enterHangar(campaignMission+1); return; }
    else { loadMission(campaignMission); return; }
  }
  if (gState==='hangar' && (e.code==='Space'||e.code==='Enter')) {
    if(!_availableAcf)_rebuildAcfLists();
    const selAcf=_availableAcf[hangarIdx];
    if(selAcf){playerAircraftId=selAcf.id; applyAircraft(selAcf.id); _rebuildAcfLists(); saveCampaign();}
    if(pendingNextMission>=0){ selectIdx=pendingNextMission; loadMission(pendingNextMission); return; }
    else { gState='mission_select'; return; }
  }
  if (gState==='hangar') {
    const maxH=unlockedAircraft.length-1;
    if(e.code==='ArrowUp'||e.code==='KeyW')  hangarIdx=Math.max(0,hangarIdx-1);
    if(e.code==='ArrowDown'||e.code==='KeyS') hangarIdx=Math.min(maxH,hangarIdx+1);
  }
  if (gState==='campaign_complete' && (e.code==='Space'||e.code==='Enter')) {
    gState='mission_select';
  }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// ─── TARGET CYCLING ─────────────────────────────────────────
function cycleTarget() {
  const pl=player;
  const alive = enemies.filter(e => e.alive);
  if (!alive.length) return;
  const curIdx = pl.lockTarget ? alive.indexOf(pl.lockTarget) : -1;
  const nextTarget = alive[(curIdx + 1) % alive.length];
  if (nextTarget !== pl.lockTarget) {
    pl.lockTarget = nextTarget;
    pl.lockStrength = 0;
    wasLocked = false;
  }
  pl.lockPinned = true;
  playFx('lock');
}

function cycleTargetPrev() {
  const pl=player;
  const alive = enemies.filter(e => e.alive);
  if (!alive.length) return;
  const curIdx = pl.lockTarget ? alive.indexOf(pl.lockTarget) : 0;
  const nextTarget = alive[(curIdx - 1 + alive.length) % alive.length];
  if (nextTarget !== pl.lockTarget) { pl.lockTarget=nextTarget; pl.lockStrength=0; wasLocked=false; }
  pl.lockPinned = true;
  playFx('lock');
}

// Fire the current weapon assuming it is NOT a gun
function handleSecondaryFire() {
  const pl=player, plW=pl.weapons;
  const w = plW[pl.wIdx];
  if (w.type==='gun') return;
  // Check empty before firing
  if (w.ammo <= 0) {
    playFx('nolock');
    radioMsg('WINCHESTER — '+w.abbr+' DEPLETED');
    // Auto-cycle to next weapon with ammo
    const _wLen=plW.length;
    for (let i=1; i<_wLen; i++) {
      const next = (pl.wIdx + i) % _wLen;
      const _nw=plW[next];
      if (_nw.ammo > 0 && _nw.type !== 'gun') {
        pl.wIdx = next;
        radioMsg('SWITCHING TO '+_nw.abbr);
        break;
      }
    }
    return;
  }
  if (w.type==='ir'||w.type==='radar') spawnMissile(w.type);
  else if (w.type==='bomb'||w.type==='lgb') spawnBomb(w.type);
}

// ─── GAMEPAD ────────────────────────────────────────────────
//  BUTTON MAP (Xbox-style / XInput):
//  B[0]=A   B[1]=B   B[2]=X   B[3]=Y
//  B[4]=LB  B[5]=RB  B[6]=LT  B[7]=RT  (.value = analog 0–1)
//  B[8]=Back  B[9]=Start
//  B[10]=L3(L.stick click)  B[11]=R3
//  B[12]=D↑  B[13]=D↓  B[14]=D←  B[15]=D→
//
//  L.Stick X/Y  = Roll / Pitch (body-relative)
//  LB / RB      = Yaw left / right
//  LT (analog)  = Decelerate below cruise (0%=cruise, 100%=near-stall)
//  RT (analog)  = Accelerate above cruise (0%=cruise, 99%=max dry, 100%=AFTERBURNER)
//  A  (hold)    = Machine gun
//  B  (press)   = Fire selected weapon
//  Y            = Cycle weapons
//  X            = Cycle targets
//  L3 (click)   = Deploy flares / countermeasures
//  D-pad ← / →  = Prev / next weapon
//  D-pad ↓      = Extra flare salvo
//  Start        = Pause
// ─────────────────────────────────────────────────────────────
let prevBtn = {};

const _gpResult = {pitch:0, roll:0, yaw:0, rt:0, lt:0};  // reused every frame

function readGamepad(dt) {
  const pl=player;
  const gpList = navigator.getGamepads();
  let gp = null;
  for (const g of gpList) { if (g && g.connected) { gp=g; break; } }
  if (!gp) return _gpZero;
  if (!aCtx) initAudio();

  const B = gp.buttons, A = gp.axes;

  const ly = _gpDz(A[1]||0);           // left stick Y → pitch
  const lt = B[6]?.value || 0;      // left trigger  → decelerate (analog 0–1)
  const rt = B[7]?.value || 0;      // right trigger → accelerate / AB (analog 0–1)
  const yawDir = (B[5]?.pressed ? 1 : 0) - (B[4]?.pressed ? 1 : 0);

  if (gState === 'playing') {
    // A (0) = machine gun — hold fires (internally rate-limited)
    if (B[0]?.pressed) spawnBullet();
    // B (1) = fire selected secondary — one shot per press
    if (B[1]?.pressed && !prevBtn[1]) handleSecondaryFire();
    // Y (3) = cycle weapons/munitions
    if (B[3]?.pressed && !prevBtn[3]) { pl.wIdx=(pl.wIdx+1)%pl.weapons.length; pl.lockPinned=false; }
    // X (2) = cycle enemy targets
    if (B[2]?.pressed && !prevBtn[2]) cycleTarget();
    // L3 / left stick click (10) = deploy flares
    if (B[10]?.pressed && !prevBtn[10]) deployFlares();
    // D-pad ↑ (12) = radar range zoom out (larger range), wraps
    if (B[12]?.pressed && !prevBtn[12]) {
      radarRangeIdx=(radarRangeIdx+1)%RADAR_RANGE_OPTIONS.length; _updateRadarRange();
    }
    // D-pad ↓ (13) = radar range zoom in (smaller range), wraps
    if (B[13]?.pressed && !prevBtn[13]) {
      radarRangeIdx=(radarRangeIdx-1+RADAR_RANGE_OPTIONS.length)%RADAR_RANGE_OPTIONS.length; _updateRadarRange();
    }

    if (B[14]?.pressed && !prevBtn[14])

    // D-pad → (15) = next weapon
    if (B[15]?.pressed && !prevBtn[15])

  const _bLen=B.length; for (let i=0; i<_bLen; i++) prevBtn[i] = B[i]?.pressed || false;
  _gpResult.pitch = ly; _gpResult.roll = lx; _gpResult.yaw = yawDir;
  _gpResult.rt = rt; _gpResult.lt = lt;
  return _gpResult;
}

// ─── GAMEPAD MENU NAVIGATION (runs every frame in all states) ─

  } else if (gState==='briefing') {
    if (press(0)||press(9)) beginMission();                                 // A/Start = fly
    if (press(1)) gState='mission_select';                                  // B = back
  } else if (gState==='debrief') {
    if (press(0)) {

      else if (missionWon) { _enterHangar(campaignMission+1); }
      else loadMission(campaignMission);
    }
    if (press(1)||press(9)) gState='mission_select';
  } else if (gState==='campaign_complete') {
    if (press(0)||press(9)) gState='mission_select';
  } else if (gState==='hangar') {
    const maxH=unlockedAircraft.length-1;
    if (press(12)) {const _hi=hangarIdx-1; hangarIdx=_hi>0?_hi:0;}
    if (press(13)) {const _hi=hangarIdx+1; hangarIdx=_hi<maxH?_hi:maxH;}
    if (press(0)) {
      if(!_availableAcf)_rebuildAcfLists();
      const selAcf=_availableAcf[hangarIdx];
      if(selAcf){playerAircraftId=selAcf.id; applyAircraft(selAcf.id); _rebuildAcfLists(); saveCampaign();}
      if(pendingNextMission>=0){ selectIdx=pendingNextMission; loadMission(pendingNextMission); }
      else gState='mission_select';
    }
    if (press(1)||press(9)) gState='mission_select';
  } else if (gState==='paused') {
    if (press(9)||press(1)) gState='playing';
  }

  const _bLen=B.length; for (let i=0; i<_bLen; i++) prevMenuBtn[i] = B[i]?.pressed || false;
}

  const cRx=_me[0],cRy=_me[1],cRz=_me[2];

  const vz=(_pvx*cFx+_pvy*cFy+_pvz*cFz)*_invVLen; if(vz<0.01) return;

// ─ Altitude Tape ──────────────────────────────────────────
function drawAltitudeTape(ft,vsiMs) {
  if(!_cfStrutPath)_rebuildCockpitFrame();

  hud.fillStyle='rgba(0,5,14,0.85)';hud.fillRect(tx,_cyH2,ALT_TW,ALT_TH);
  hud.strokeStyle='rgba(0,229,255,0.35)';hud.lineWidth=1.2;hud.strokeRect(tx,_cyH2,ALT_TW,ALT_TH);
  hud.beginPath();hud.rect(tx,_cyH2,ALT_TW,ALT_TH);hud.clip();
  const _altRaw=Math.floor((ft-ALT_CLIP_PX)*0.002)*500; const _altStart=_altRaw>0?_altRaw:0;
  const _altEndR=Math.ceil((ft+ALT_CLIP_PX)*0.002)*500; const _altEnd=_altEndR<100000?_altEndR:100000;
  const _cyft=cy+ft*ALT_PX;
  hud.strokeStyle=C.cyan; hud.fillStyle=C.cyan;
  hud.font='bold 13px Courier New'; hud.textAlign='left';
  // Minor ticks every 500ft, major ticks+labels every 2000ft
  // Snap starts to multiples of 500 / 2000
  const _minorBase=Math.ceil(_altStart/500)*500;
  const _majorBase=Math.ceil(_altStart/2000)*2000;
  const _txP12=tx+12;
  // Pass 1 — minor ticks (500ft, dim)
  hud.globalAlpha=0.35;hud.lineWidth=0.8;hud.beginPath();
  for(let a=_minorBase;a<=_altEnd;a+=500){
    const _yA=_cyft-a*ALT_PX;
    hud.moveTo(tx,_yA);hud.lineTo(tx+5,_yA);
  }
  hud.stroke();
  // Pass 2 — major ticks+labels every 2000ft
  hud.globalAlpha=0.90;hud.lineWidth=1.6;hud.beginPath();
  for(let a=_majorBase;a<=_altEnd;a+=2000){
    const _yA=_cyft-a*ALT_PX;
    hud.moveTo(tx,_yA);hud.lineTo(_txP12,_yA);
  }
  hud.stroke();
  // Labels — skip any within ±30px of centre (avoids readout-box overlap)
  for(let a=_majorBase;a<=_altEnd;a+=2000){
    const _yA=_cyft-a*ALT_PX;
    const _dy=_yA-cy; if(_dy<30&&_dy>-30) continue;
    hud.fillText(Math.round(a*0.001),_atTxP15,_yA+5);
  }
  hud.restore();
  // Digital readout
  hud.fillStyle='rgba(0,3,12,0.97)';hud.fillRect(tx,_tapeCyM18,ALT_TW,36);
  hud.strokeStyle=C.lime;hud.lineWidth=1.8;hud.strokeRect(tx,_tapeCyM18,ALT_TW,36);
  hud.fillStyle=C.cyan;hud.beginPath();hud.moveTo(tx,cy);hud.lineTo(_atTxP10,_tapeCyM7);hud.lineTo(_atTxP10,_tapeCyP7);hud.closePath();hud.fill();
  C.glow(C.lime);hud.fillStyle=C.lime;hud.font='bold 18px Courier New';hud.textAlign='center';
  hud.fillText(ft,tx+ALT_TW2,_tapeCyP7);C.noGlow();
  hud.fillStyle=C.dim;hud.font='bold 11px Courier New';hud.textAlign='center';
  hud.fillText('FEET',tx+ALT_TW2,_cyH2-6);
  // VSI bar
  const vW=9,vx=tx+ALT_TW+5,_cyVH2=cy-ALT_VH2;
  hud.fillStyle='rgba(0,5,14,0.75)';hud.fillRect(vx,_cyVH2,vW,ALT_VH);
  hud.strokeStyle='rgba(0,229,255,0.28)';hud.lineWidth=0.9;hud.strokeRect(vx,_cyVH2,vW,ALT_VH);
  const _vsiPos=vsiMs>0,_vAbs=_vsiPos?vsiMs:-vsiMs;

  if(vNorm>0.5){hud.fillStyle=_vsiPos?C.lime:C.orange;hud.fillRect(vx+1,_vsiPos?cy-vNorm:cy,vW-2,vNorm);}
  hud.strokeStyle='rgba(0,229,255,0.55)';hud.lineWidth=1.2;hud.beginPath();hud.moveTo(vx,cy);hud.lineTo(vx+vW,cy);hud.stroke();
  // Radar alt
  const rCol=ft<500?C.red:ft<1000?C.orange:C.cyan;
  hud.fillStyle=rCol;hud.font='bold 11px Courier New';hud.textAlign='left';hud.globalAlpha=ft<800&&blink?1:0.75;
  hud.fillText(_altRoundStr,_atTxP2,cy+ALT_TH2+17);hud.globalAlpha=1;

// ─ Damage / Flare overlays ────────────────────────────────
function drawDamageOverlay(dt) {
  const pl=player;
  const pdf=pl.damageFlash, pff=pl.flaresFlash;
  if(pdf>0){
    if(!_dmgFlashGrad)_rebuildDmgGrad();
    hud.globalAlpha=pdf<1?pdf:1;
    hud.fillStyle=_dmgFlashGrad;hud.fillRect(0,0,W,H);
    hud.globalAlpha=1;
    pl.damageFlash=pdf-dt;
  }
  if(pff>0){
    hud.fillStyle=`rgba(255,200,80,${pff*0.2})`;hud.fillRect(0,0,W,H);
    pl.flaresFlash=pff-dt*2;
  }
  // G-force tunnel vision — kicks in above 7G
  const G = pl.gForce || 0;
  if(G > 6.5) {
    const _gn=(G-6.5)*0.4; const gNorm=_gn<1?_gn:1; // 0 at 6.5G → 1 at 9G (0.4=1/2.5)
    // Black vignette closing in from edges — cache gradient, rebuild only when gNorm changes by >1%
    const innerR = _dmgGH55 - gNorm * _dmgGH45;
    if(!_cfStrutPath)_rebuildCockpitFrame();
    const _gNormRnd = (gNorm*100+0.5)|0;
    if(_gNormRnd !== _dmgGNormRnd) {
      _dmgGNormRnd = _gNormRnd;
      _dmgGvCache = hud.createRadialGradient(_cfCx, _tapeCy, innerR, _cfCx, _tapeCy, _dmgOuterR);
      _dmgGvCache.addColorStop(0, 'rgba(0,0,0,0)');
      const _gv=gNorm*1.1; _dmgGvCache.addColorStop(1,`rgba(0,0,0,${_gv<0.97?_gv:0.97})`);
    }
    hud.fillStyle = _dmgGvCache; hud.fillRect(0, 0, W, H);
    // Greyscale wash above 8.5G
    if(G > 8.5) {
      const _ga=(G-8.5)*0.4; const greyAlpha=_ga<0.55?_ga:0.55;
      hud.fillStyle = `rgba(180,180,180,${greyAlpha})`; hud.fillRect(0,0,W,H);
    }
  }
}

// ─ Bomb Impact Predictor beacon ──────────────────────────────
function drawBombBeacon() {
  const pl=player, w=pl.weapons[pl.wIdx];
  if ((w.type!=='bomb' && w.type!=='lgb') || w.ammo<=0) return;
  if(!_cfStrutPath)_rebuildCockpitFrame();
  const _pp=pl.pos, _pv=pl.vel;
  const py=_pp.y, vy=_pv.y;
  // Solve y(t)=py+vy*t-½*g*t²=0 using actual game gravity (73.575 m/s²)
  const _g2 = 73.575, _g2half = 36.7875;
  const _disc = vy*vy + 2*_g2*py;
  if (_disc < 0 || py <= 0) return;
  const tLand = (vy + Math.sqrt(_disc)) / _g2;
  if (tLand < 0.1 || tLand > 60) return;
  const ix = _pp.x + _pv.x*tLand;
  const iz = _pp.z + _pv.z*tLand;
  const imp2 = _v1.set(ix,0,iz).project(camera);
  if (imp2.z >= 1) return;
  const sx = imp2.x*_cfCx+_cfCx, sy = -imp2.y*_tapeCy+_tapeCy;
  // Screen-space blast radius: project a point blastR metres sideways
  const blastR = w.type==='lgb' ? 120 : 180;
  const edge2 = _v2.set(ix+blastR,0,iz).project(camera);
  const ex = edge2.x*_cfCx+_cfCx;
  const screenR = Math.max(10, Math.min(Math.abs(ex-sx), 180));
  const isLgb = w.type==='lgb';
  const bCol = isLgb ? 'rgba(0,255,160,0.92)' : 'rgba(255,200,0,0.92)';
  const rCol = isLgb ? 'rgba(0,255,160,0.30)' : 'rgba(255,200,0,0.28)';
  hud.save();
  // Blast ring
  hud.strokeStyle=rCol; hud.lineWidth=1.6; hud.setLineDash([6,5]);
  hud.beginPath(); hud.arc(sx,sy,screenR,0,TAU); hud.stroke();
  hud.setLineDash(NO_DASH);
  // Drop line from HUD centre to impact
  hud.strokeStyle='rgba(255,200,0,0.18)'; hud.lineWidth=1; hud.setLineDash([3,6]);
  hud.beginPath(); hud.moveTo(_cfCx,_tapeCy); hud.lineTo(sx,sy); hud.stroke();
  hud.setLineDash(NO_DASH);
  // Crosshair
  C.glow(bCol); hud.strokeStyle=bCol; hud.lineWidth=2;
  const _g=13;
  hud.beginPath();
  hud.moveTo(sx-_g,sy); hud.lineTo(sx-4,sy); hud.moveTo(sx+4,sy); hud.lineTo(sx+_g,sy);
  hud.moveTo(sx,sy-_g); hud.lineTo(sx,sy-4); hud.moveTo(sx,sy+4); hud.lineTo(sx,sy+_g);
  hud.stroke();
  hud.fillStyle=bCol; hud.beginPath(); hud.arc(sx,sy,3,0,TAU); hud.fill();
  C.noGlow();
  // T-minus readout
  hud.fillStyle=bCol; hud.font='bold 11px Courier New'; hud.textAlign='center';
  hud.fillText('T−0'+(tLand<10?'0':'')+tLand.toFixed(1)+'s', sx, sy+screenR+14);
  hud.restore();
}

let bLines=[], bCharIdx=0, bLineIdx=0, bCharT=0;
function resetBriefing() { bLines=[]; bCharIdx=0; bLineIdx=0; bCharT=0; }

function tickBriefing(dt) {
  if (bLineIdx>=currentBriefLines.length) return;
  bCharT+=dt;
  while (bCharT>=0.006 && bLineIdx<currentBriefLines.length) {
    bCharT-=0.006;
    const ln=currentBriefLines[bLineIdx];
    // Purely index-based: no push(), avoids doubling each line
    bCharIdx++;
    if (bCharIdx>=ln.length) {
      bLines[bLineIdx]=ln;   // finalize this slot
      bLineIdx++; bCharIdx=0;
    } else {
      bLines[bLineIdx]=ln.substring(0,bCharIdx);
    }
  }
}

    hud.font='11px Courier New'; hud.textAlign='left'; // hoist: constant across lore lines
    for(let i=0;i<_lLen;i++){const ln=_lore[i];
      let col=C.lime;
      if(ln.includes('SPECIAL:')) col='rgba(0,255,160,0.9)';
      if(ln.includes('STATUS:'))  col=C.yellow;
      hud.fillStyle=col;
      hud.fillText(ln, _loreX, _loreY16+i*17);
    }
  }

  // ── Nav hints ──────────────────────────────────────────────
  if(blink){
    C.glow(C.yellow); hud.fillStyle=C.yellow; hud.font='13px Courier New'; hud.textAlign='center';
    const nxt = pendingNextMission >= 0 ? 'SELECT AIRCRAFT  ▶  LAUNCH M'+(pendingNextMission+1) : 'CONFIRM AIRCRAFT';
    hud.fillText('↑ ↓  CHOOSE AIRCRAFT     SPACE  '+nxt+'     ESC  BACK', _cfCx, _menuFootY);
    C.noGlow();
  }
  cornerDeco();
}

// ─── UPDATED MISSION SELECT (2-column, 10 missions) ─────────────
function drawMissionSelect() {
  if(!_cfStrutPath)_rebuildCockpitFrame();
  hud.clearRect(0,0,W,H);
  scanlines();

  C.glow(C.cyan); hud.fillStyle=C.cyan; hud.font='36px Courier New'; hud.textAlign='center';
  hud.fillText('SHADOW PROTOCOL', _cfCx, 58); C.noGlow();
  hud.fillStyle=C.mag; hud.font='13px Courier New';
  hud.fillText(_missionSelectTitle, _cfCx, 82);
  hud.strokeStyle=C.cyanD; hud.lineWidth=1; hud.globalAlpha=0.4;
  hud.beginPath(); hud.moveTo(_cfCx-380,96); hud.lineTo(_cfCx+380,96); hud.stroke();
  hud.globalAlpha=1;

  const cols=2, rows=5;
  const cardW=_mSelCardW;
  const cardH=70, gapX=12, gapY=8;
  const totalW=cols*cardW+(cols-1)*gapX;
  const startX=_cfCx-totalW/2, startY=108;

  const _mLen=MISSIONS.length;
  for(let i=0;i<_mLen;i++){const M=MISSIONS[i];
    const col=Math.floor(i/rows), row=i%rows;
    const cx=startX+col*(cardW+gapX);
    const cy=startY+row*(cardH+gapY);
    const locked=i>campaignUnlocked;
    const selected=i===selectIdx;
    const rank=campaignRanks[i]||'';

    hud.fillStyle=locked?'rgba(4,6,10,0.88)':'rgba(0,8,20,0.90)';
    hud.fillRect(cx,cy,cardW,cardH);
    const bc=locked?'rgba(60,80,110,0.4)':selected?(blink?C.cyan:'rgba(0,229,255,0.75)'):'rgba(0,229,255,0.28)';
    hud.strokeStyle=bc; hud.lineWidth=selected?2:1; hud.strokeRect(cx,cy,cardW,cardH);

    if(locked){
      hud.fillStyle='rgba(70,90,120,0.45)'; hud.font='bold 12px Courier New'; hud.textAlign='center';
      hud.fillText(MISSION_NUMS[i]+' ─ ██████████ ─ CLASSIFIED', cx+cardW/2, cy+cardH/2+4);
    } else {
      const _cx42=cx+42, _cy46=cy+46, _thrW=cardW-100;
      C.glow(selected?C.cyan:C.dim);
      hud.fillStyle=selected?C.cyan:C.dim; hud.font='bold 18px Courier New'; hud.textAlign='left';
      hud.fillText(MISSION_NUMS[i], cx+10, cy+26); C.noGlow();

      hud.fillStyle=selected?C.white:C.cyan; hud.font='bold 14px Courier New';
      hud.fillText(M.name, _cx42, cy+26);

      hud.fillStyle=C.dim; hud.font='10px Courier New';
      hud.fillText(M.zoneLabel, _cx42, cy+40);

      // Threat bar
      hud.fillStyle='rgba(0,12,24,0.75)'; hud.fillRect(_cx42,_cy46,_thrW,7);
      const tc=M.threat>=10?C.red:M.threat>=9?C.orange:C.yellow;
      hud.fillStyle=tc; hud.fillRect(_cx42,_cy46,_thrW*(M.threat/10),7);
      hud.strokeStyle='rgba(0,229,255,0.2)'; hud.lineWidth=0.6;
      hud.strokeRect(_cx42,_cy46,_thrW,7);
      hud.fillStyle=C.dim;
      hud.fillText('THREAT', _cx42+_thrW+4, cy+53);

      if(campaignScores[i]>0){
        const rCol=rank==='S'?C.yellow:rank==='A'?C.lime:rank==='B'?C.cyan:rank==='C'?C.orange:rank==='D'?C.red:C.dim;
        C.glow(rCol); hud.fillStyle=rCol; hud.font='bold 22px Courier New'; hud.textAlign='right';
        hud.fillText(rank, cx+cardW-10, cy+44); C.noGlow();
      } else if(!locked){
        hud.fillStyle='rgba(0,229,255,0.28)'; hud.font='11px Courier New'; hud.textAlign='right';
        hud.fillText('NEW', cx+cardW-10, cy+40);
      }
    }
    hud.textAlign='left';
  }

  // Hangar nav hint
  hud.fillStyle='rgba(0,229,255,0.45)'; hud.font='11px Courier New'; hud.textAlign='center';
  hud.fillText('[H] / [Y] — HANGAR & AIRCRAFT SELECTION', _cfCx, startY+rows*(cardH+gapY)+14);

  if(blink){
    C.glow(C.yellow); hud.fillStyle=C.yellow; hud.font='13px Courier New';
    hud.fillText('↑ ↓ ← →  NAVIGATE     SPACE  LAUNCH     ESC  TITLE', _cfCx, _menuMSelFootY);
    C.noGlow();
  }
  cornerDeco();
}

// ─── UPDATED DEBRIEF (dynamic aircraft, hangar flow) ─────────────
let _debriefRank='', _debriefRankCol='', _debriefRankLabel='', _debriefTitle='', _debriefRows=null;

function drawDebrief() {
  if(!_cfStrutPath)_rebuildCockpitFrame();
  hud.clearRect(0,0,W,H);
  scanlines();

  const tc=missionWon?C.lime:C.red;
  const tt=missionWon?'MISSION COMPLETE':'MISSION FAILED';

  C.glow(tc); hud.fillStyle=tc; hud.font='44px Courier New'; hud.textAlign='center';
  hud.fillText(tt, _cfCx, _tapeCy-155); C.noGlow();

  if(_debriefTitle){
    hud.fillStyle='rgba(0,229,255,0.35)'; hud.font='15px Courier New';
    hud.fillText(_debriefTitle, _cfCx, _tapeCy-115);
  }

  hex(hud,_cfCx-220,_tapeCy-102,440,200,tc,0.9);

  if(_debriefRows){
    hud.font='12px Courier New'; hud.textAlign='center';
    const _drLen=_debriefRows.length, _tyCyM72=_tapeCy-72;
  for(let i=0;i<_drLen;i++){const [l,v]=_debriefRows[i]; const _ry=_tyCyM72+i*32;
    hud.fillStyle=C.dim; hud.fillText(l, _cfCx-70, _ry);
    hud.fillStyle=C.cyan; hud.fillText(v, _cfCx+80, _ry);
  }
  }

  if(missionWon){
    C.glow(_debriefRankCol);
    hud.fillStyle=_debriefRankCol; hud.font='bold 72px Courier New';
    hud.fillText(_debriefRank, _cfCx+155, _tapeCy+10); C.noGlow();
    hud.fillStyle=_debriefRankCol; hud.font='bold 12px Courier New';
    hud.fillText(_debriefRankLabel, _cfCx+155, _tapeCy+28);

    // Newly unlocked aircraft notice
    if(justUnlockedName){
      C.glow(C.yellow); hud.fillStyle=C.yellow; hud.font='bold 13px Courier New';
      hud.fillText(_unlockedBadge, _cfCx, _tapeCy+108); C.noGlow();
    }

    const prog=(campaignUnlocked+1)/MISSIONS.length;
    hud.fillStyle=C.dim; hud.font='bold 11px Courier New';
    hud.fillText('CAMPAIGN PROGRESS', _cfCx, _tapeCy+124);
    bar(hud,_cfCx-180,_tapeCy+130,360,12,prog,1,C.cyan);
    hud.fillStyle=C.cyan; hud.font='bold 11px Courier New';
    hud.fillText(Math.round(prog*100)+'%', _cfCx, _tapeCy+154);
  }

  if(blink){
    C.glow(C.yellow); hud.fillStyle=C.yellow; hud.font='13px Courier New'; hud.textAlign='center';
    if(missionWon && campaignMission===MISSIONS.length-1){
      hud.fillText('[ SPACE ] CAMPAIGN COMPLETE     [ ESC ] MISSION SELECT', _cfCx, _tapeCy+178);
    } else if(missionWon){
      hud.fillText('[ SPACE ] HANGAR / NEXT MISSION  [ ESC ] MISSION SELECT', _cfCx, _tapeCy+178);
    } else {
      hud.fillText('[ SPACE ] RETRY     [ ESC ] MISSION SELECT', _cfCx, _tapeCy+178);
    }
    C.noGlow();
  }
  hud.textAlign='left'; cornerDeco();
}

// ─── CAMPAIGN COMPLETE ───────────────────────────────────────────
const MISSION_NUMS = ['01','02','03','04','05','06','07','08','09','10'];  // '01'..'10'
let _ccTotalScore=0, _ccTotalStr='', _ccFooter='', _ccUnlocked='';
function _enterCampaignComplete() {
  _ccTotalScore = campaignScores.reduce((a,b)=>a+b,0);
  _ccTotalStr = _ccTotalStr;
  _ccFooter = acfName+' — OPERATION SHADOW PROTOCOL — CLASSIFIED';
  _ccUnlocked = 'AIRCRAFT UNLOCKED: '+unlockedAircraft.length+' / '+AIRCRAFT.length;
  gState='campaign_complete';
}

function drawCampaignComplete() {
  if(!_cfStrutPath)_rebuildCockpitFrame();
  hud.clearRect(0,0,W,H);
  scanlines();

  // All display data precomputed in _enterCampaignComplete()

  C.glow(C.yellow); hud.fillStyle=C.yellow; hud.font='bold 42px Courier New'; hud.textAlign='center';
  hud.fillText('CAMPAIGN COMPLETE', _cfCx, 72); C.noGlow();
  C.glow(C.mag); hud.fillStyle=C.mag; hud.font='bold 16px Courier New';
  hud.fillText('OPERATION SHADOW PROTOCOL  //  ALL PROGRAMS CONCLUDED', _cfCx, 102); C.noGlow();

  hud.strokeStyle='rgba(255,224,0,0.3)'; hud.lineWidth=1; hud.globalAlpha=0.5;
  hud.beginPath(); hud.moveTo(_cfCx-380,114); hud.lineTo(_cfCx+380,114); hud.stroke();
  hud.globalAlpha=1;

  // Two-column mission summary
  const cols=2, rows=5;
  const colW=340, colH=26;
  const startX=_cfCx-cols*colW/2, startY=126;

  const _mLen=MISSIONS.length;
  for(let i=0;i<_mLen;i++){const M=MISSIONS[i];
    const c=Math.floor(i/rows), r=i%rows;
    const x=startX+c*colW, y=startY+r*colH;
    const rk=campaignRanks[i]||'─';
    const rCol=rk==='S'?C.yellow:rk==='A'?C.lime:rk==='B'?C.cyan:rk==='C'?C.orange:rk==='D'?C.red:C.dim;
    const _y14=y+14, _xcw=x+colW;
    hud.fillStyle=C.dim; hud.font='12px Courier New'; hud.textAlign='left';
    hud.fillText(M.rowLabel, x, _y14);
    hud.fillStyle=C.white; hud.textAlign='center';
    hud.fillText(campaignScores[i]||0, _xcw-80, _y14);
    C.glow(rCol); hud.fillStyle=rCol; hud.font='bold 14px Courier New'; hud.textAlign='right';
    hud.fillText(rk, _xcw-16, _y14); C.noGlow();
  }

  // Divider + totals
  const divY=startY+rows*colH+8;
  hud.strokeStyle='rgba(255,224,0,0.22)'; hud.lineWidth=0.8; hud.globalAlpha=0.6;
  hud.beginPath(); hud.moveTo(startX,divY); hud.lineTo(startX+cols*colW,divY); hud.stroke();
  hud.globalAlpha=1;

  C.glow(C.yellow); hud.fillStyle=C.yellow; hud.font='bold 16px Courier New'; hud.textAlign='center';
  hud.fillText(_ccTotalStr, _cfCx, divY+22); C.noGlow();

  hud.fillStyle='rgba(0,229,255,0.4)'; hud.font='11px Courier New';
  hud.fillText(_ccFooter, _cfCx, divY+40);

  // Unlocked aircraft count
  hud.fillStyle='rgba(178,255,89,0.6)'; hud.font='11px Courier New';
  hud.fillText(_ccUnlocked, _cfCx, divY+56);

  if(blink){
    C.glow(C.cyan); hud.fillStyle=C.cyan; hud.font='13px Courier New';
    hud.fillText('[ SPACE ] RETURN TO MISSION SELECT', _cfCx, _menuCCFootY); C.noGlow();
  }
  hud.textAlign='left'; cornerDeco();
}

// ─── TITLE CAMERA ────────────────────────────────────────────
function titleCam(t) {
  const ta=t*0.08,_pm=player.mesh;
  camera.position.set(Math.sin(ta)*90, 22, Math.cos(ta)*90);
  camera.lookAt(0,5,0);
  _pm.position.set(0,5,0); _pm.rotation.y += 0.004;
}

// ─── MAIN LOOP ───────────────────────────────────────────────
const clock = new THREE.Clock();

function loop() {
  const plMesh=player.mesh;
  requestAnimationFrame(loop);
  const _dt0=clock.getDelta(); const dt=_dt0<0.05?_dt0:0.05;
  hudT+=dt; blinkT+=dt;
  if (blinkT>0.5){ blinkT=0; blink=!blink; }

  // Gamepad menu navigation — runs in ALL states
  pollGamepadMenus();

  // Blink ground lights — only update when blink state changes
  const _bsLen=_blinkStructures.length;
  if (blinkT===0 && _bsLen) {
    const _bInt=blink?1.6:0;
    for(let _bi=0;_bi<_bsLen;_bi++){const _bs=_blinkStructures[_bi]; if(_bs.userData.alive) _bs.userData.blink.intensity=_bInt;}
  }

  const _wantsPlMesh = (gState!=='playing'&&gState!=='paused');
  if (plMesh.visible !== _wantsPlMesh) plMesh.visible = _wantsPlMesh;
  if (gState==='playing') {
    updateFlight(dt);
    _refreshMIF();
    updateEnemies(dt);
    updateSAMs(dt);
    updateProjectiles(dt);
    updateExplosions(dt);
    updateCamera(dt);
    renderer.render(scene,camera);
    drawHUD(dt);
  } else if (gState==='paused') {
    renderer.render(scene,camera);
    drawHUD(0);
    drawPause();
  } else {
    // title, mission_select, briefing, debrief, hangar, campaign_complete
    const _et=clock.elapsedTime;
    titleCam(_et);
    renderer.render(scene,camera);
    if(gState==='title') drawTitle(dt);
    else if(gState==='mission_select') drawMissionSelect();
    else if(gState==='briefing') drawBriefing(dt);
    else if(gState==='debrief') drawDebrief();
    else if(gState==='hangar') drawHangar();
    else if(gState==='campaign_complete') drawCampaignComplete();
  }
}

// ─── RESIZE ─────────────────────────────────────────────────
window.addEventListener('resize',()=>{
  W=window.innerWidth; H=window.innerHeight;
  renderer.setSize(W,H);
  camera.aspect=W/H; camera.updateProjectionMatrix();
  hc.width=W; hc.height=H;
  _cgL=null; _cgR=null; _cgT=null;  // invalidate cached gradients on resize
  _panelWx=0;  // invalidate panel layout cache
  _cornerPath=null;  // invalidate corner deco path
  _scanlinePath=null;  // invalidate scanline path
  _cfStrutPath=null;  // invalidate cockpit frame cache
  _dmgFlashGrad=null;  // invalidate damage flash gradient
});

// ─── START ───────────────────────────────────────────────────
applyAircraft(playerAircraftId);   // restore saved aircraft appearance + params
player.mesh.position.set(0,5,0);
loop();
